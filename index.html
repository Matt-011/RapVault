<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <link rel="stylesheet" href="plugins/bootstrap/css/bootstrap.min.css">
    <link rel="shortcut icon" type="imagex/png" href="images/logo.png">
    <link rel="stylesheet" href="css/estilo.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>
    <!-- LOGO FIXA -->
    <div class="logo-fixada">
        <img src="images/logo.png" alt="Logo">
    </div>

    <!-- HEADER E MENU -->
    <header>
        <nav class="navbar"> <!-- Menu principal -->
            <div class="menu-left">
                <a href="#">HOME</a>
                <a href="pages/Bully.html">ARTISTAS</a>
            </div>

            <div class="menu-right">
                <a href="">ALBUNS</a>
                <a href="#">AJUDA</a>
            </div>
        </nav>
    </header>

    <div id="popup" class="popup">
        <div class="popup-conteudo">
            <h2>📢 Atualizações</h2>
            <p>Nova atualização disponível!</p>
            <button onclick="fecharPopup()">Fechar</button>
        </div>
    </div>

    <section class="carrossel-3d">

        <h1>As album ja prontos</h1>

        <button class="seta esquerda" onclick="mover(-1)">❮</button>

        <div class="viewport">
            <div class="track" id="track">

                <!-- CARD -->
                <a href="pages/13lentes.html" class="card-3d">
                    <model-viewer src="3dmodels/13 Lentes de um Final Feliz.glb" auto-rotate interaction-prompt="none"
                        disable-zoom disable-pan disable-tap shadow-intensity="1">
                    </model-viewer>

                    <div class="info">
                        <p class="album">13 Lentes de um Final Feliz</p>
                        <p class="artista">YUN LI</p>
                    </div>
                </a>

                <!-- CARD -->
                <a href="pages/Bully.html" class="card-3d">
                    <model-viewer src="3dmodels/Bully.glb" auto-rotate interaction-prompt="none" disable-zoom
                        disable-pan disable-tap shadow-intensity="1">
                    </model-viewer>

                    <div class="info">
                        <p class="album">Bully</p>
                        <p class="artista">YE</p>
                    </div>
                </a>

                <a href="pages/SHMG.html" class="card-3d">
                    <model-viewer src="3dmodels/So Help Me God.glb" auto-rotate interaction-prompt="none" disable-zoom
                        disable-pan disable-tap shadow-intensity="1">
                    </model-viewer>

                    <div class="info">
                        <p class="album">So Help Me God</p>
                        <p class="artista">Kanye West</p>
                    </div>
                </a>

                <!-- CARD -->
                <a href="#" class="card-3d">
                    <model-viewer src="3dmodels/Yandhi.glb" auto-rotate interaction-prompt="none" disable-zoom
                        disable-pan disable-tap shadow-intensity="1">
                    </model-viewer>

                    <div class="info">
                        <p class="album">Yandhi</p>
                        <p class="artista">Kanye West</p>
                    </div>
                </a>


                <a href="#" class="card-3d">
                    <model-viewer src="3dmodels/Swish.glb" auto-rotate interaction-prompt="none" disable-zoom
                        disable-pan disable-tap shadow-intensity="1">
                    </model-viewer>

                    <div class="info">
                        <p class="album">Swish</p>
                        <p class="artista">Kanye West</p>
                    </div>
                </a>

                <a href="pages/YeezusII.html" class="card-3d">
                    <model-viewer src="3dmodels/Yezuus II.glb" auto-rotate interaction-prompt="none" disable-zoom
                        disable-pan disable-tap shadow-intensity="1">
                    </model-viewer>

                    <div class="info">
                        <p class="album">Yezuus II</p>
                        <p class="artista">Kanye West</p>
                    </div>
                </a>

                <a href="#" class="card-3d">
                    <model-viewer src="3dmodels/Waves.glb" auto-rotate interaction-prompt="none" disable-zoom
                        disable-pan disable-tap shadow-intensity="1">
                    </model-viewer>

                    <div class="info">
                        <p class="album">Waves</p>
                        <p class="artista">Kanye West</p>
                    </div>
                </a>
            </div>
        </div>

        <button class="seta direita" onclick="mover(1)">❯</button>

    </section>

    <script>
        function fecharPopup() {
            document.getElementById("popup").style.display = "none";
        }
    </script>

    <script>
        let indexAtual = 0;

        const track = document.getElementById("track");
        const viewport = document.querySelector(".viewport");

        function atualizarClasses() {
            const cards = document.querySelectorAll(".card-3d");

            cards.forEach(card => card.classList.remove("ativo"));
            cards[indexAtual].classList.add("ativo");
        }

        function centralizar() {
            const cards = document.querySelectorAll(".card-3d");
            const cardWidth = cards[0].offsetWidth;
            const gap = 40;

            const centroViewport = viewport.offsetWidth / 2;
            const centroCard = cardWidth / 2;

            const posicao = (cardWidth + gap) * indexAtual;
            const offset = posicao - centroViewport + centroCard;

            track.style.transform = `translateX(-${offset}px)`;
        }

        function mover(dir) {
            const cards = document.querySelectorAll(".card-3d");

            if (dir === 1) {
                // vai pra direita → move primeiro pro final
                track.appendChild(cards[0]);
            } else {
                // vai pra esquerda → move último pro começo
                track.insertBefore(cards[cards.length - 1], cards[0]);
            }

            // mantém sempre o do meio ativo
            indexAtual = Math.floor(document.querySelectorAll(".card-3d").length / 2);

            atualizarClasses();
            centralizar();
        }

        window.addEventListener("load", () => {
            const cards = document.querySelectorAll(".card-3d");

            // define o do meio como ativo
            indexAtual = Math.floor(cards.length / 2);

            atualizarClasses();
            centralizar();
        });
    </script>
</body>

</html>
